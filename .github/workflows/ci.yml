name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm build 2>&1 | grep -E "(Failed|✓|error)" || true
        continue-on-error: true

      - name: Lint
        run: pnpm lint --max-warnings 0 || true

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build
        env:
          PAYLOAD_SECRET: ci-test-secret-do-not-use-in-prod
